[build]
builder = "railpack"
# La référence projet sur `ParcoursCandidatClient` (Blazor WebAssembly) embarque
# automatiquement les fichiers statiques du WASM dans `out/wwwroot` lors du publish.
buildCommand = "dotnet publish ParcoursCandidatApi.csproj -c Release -o out"

[deploy]
# Un seul service Railway sert à la fois l'API (`/api/*`) et l'UI Blazor (`/` + fallback SPA).
# Le service Railway est configuré avec un "Custom port" = 8080 (Settings → Networking).
# Le proxy Railway route le trafic public vers le port 8080 du conteneur : on force donc
# Kestrel à écouter sur ce port en dur, indépendamment de la variable `$PORT`.
startCommand = "ASPNETCORE_URLS=http://0.0.0.0:8080 ./out/ParcoursCandidatApi"
