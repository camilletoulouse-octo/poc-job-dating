[build]
# On utilise notre Dockerfile à la racine plutôt que la détection automatique
# de Railpack, qui ne sait pas embarquer correctement le projet Blazor
# WebAssembly référencé en `ProjectReference` (et donc ne génère pas le `wwwroot`).
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# Un seul service Railway sert à la fois l'API (`/api/*`) et l'UI Blazor (`/`
# + fallback SPA). Le port d'écoute (`8080`) est défini dans le Dockerfile via
# `ASPNETCORE_URLS` pour correspondre au "Custom port" configuré côté Railway.
